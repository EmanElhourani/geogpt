* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


        #chat-container {
    z-index: 2;
    width: 100%;
    max-width: 450px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.5); /* White background with 50% transparency */
    border-radius: 15px; /* Rounded corners */
    
    margin-top: 20px;
        }

        .chat-container h2 {
		color: White;
    font-size: 1.5em;
    margin-bottom: 15px;

}

        #chat-messages {
            height: 450px;

            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
			background: white; /* White background with 50% transparency */
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .user-message {
            background-color: #FFB6C1;
            margin-left: 20%;
            color:Black;
			  box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        .bot-message {
            background-color: #FFF8B0;
            margin-right: 20%;
            color:Black;
			  box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }


        #input-container {
            display: flex;
    align-items: center;
    padding: 10px;
    background: #fff;
    border-radius: 25px;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        #user-input {
            flex-grow: 1;
    border: none;
    outline: none;
    padding: 10px;
    font-size: 1em;
    border-radius: 25px;
        }

        #send-button {
            background: #FFB6C1;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    margin-left: 10px;
    cursor: pointer;
    transition: background 0.3s;
        }

        #send-button:hover {
            background: #ea3baa;
        }


        .place-card {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
        }

        /* Header styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* Align items to the top */
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: sticky; /* Keeps the header fixed at the top */
            top: 0;
			  
            z-index: 1000;
        }
		        header img {
            height: 100px; /* Adjust the height as needed */

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
	background: radial-gradient(circle, #FFFF99, #FFB6C1);


}

main {
    display: flex;
    justify-content: space-between;
    padding: 40px 5%;
    height: calc(100vh - 100px);
    position: relative;
}

.intro {
    z-index: 2;
    width: 40%;
    height: -25%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    color: #333;
}
.intro h1 {
    font-size: 2em;
    color: Black;	
	font-family: georgia, serif;
}

.intro p {
    margin-top: 10px;
    font-size: 1.1em;
    color: white;
	font-family: Verdana, sans-serif;
}
#map {
    width: 80%;  /* Increased width */
    height: 100%;
    z-index: 1;
    position: relative;
    border-radius: 15px; /* Added rounded corners */
    overflow: hidden; /* Ensures child elements respect border radius */
}




/* Making sure chat box stays visible */
main:before {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 60%; /* Adjusted to match the new map width */
    z-index: 0;
}
footer h3 {
margin: 0;
padding-bottom: 5px;
}

/* Styling for the social icons */
.social-icon {
width: 15px; /* Width of the icon */
height: auto; /* Maintain aspect ratio */
margin-left: 5px; /* Space between the text and the icon */
vertical-align: middle; /* Align the icon vertically with the text */
border-radius: 5px;
}

footer {
position: fixed; /* Keep the footer at the bottom */
bottom: 0;
width: 100%; /* Stretch across the full width */
color: white; /* White text color */
padding: 20px 0; /* Spacing above and below the footer content */
text-align: center; /* Center the text */
display: flex; /* Flexbox to align sections horizontally */
justify-content: space-around; /* Space the sections evenly */
}

/* Styling the Leaflet Routing Machine directions box */
.leaflet-routing-container {
    background-color: white; /* Make the box background white */
    border: 1px solid #ccc; /* Add a subtle border */
    border-radius: 8px; /* Rounded corners */
    padding: 10px; /* Add some padding */
    box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1); /* Add a shadow for a raised effect */
    max-width: 400px; /* Set a max width */
    font-family: Arial, sans-serif; /* Set a clean font */
    color: #333; /* Use a dark color for the text */
}


/* Style the direction steps */
.leaflet-routing-container .leaflet-routing-alt {
    margin-top: 10px; /* Add spacing between directions */
}

.leaflet-routing-container .leaflet-routing-alt li {
    margin-bottom: 5px; /* Add spacing between steps */
    line-height: 1.4; /* Improve readability */
    opacity: 0; /* Start hidden */
    transform: translateX(-20px); /* Start slightly left */
    transition: all 0.3s ease-in-out; /* Smooth transition for steps */
}



/* Highlight important steps */
.leaflet-routing-container .leaflet-routing-alt li em {
    font-weight: bold;
    color: #007bff; /* Highlight turns in blue */
}
/* Add a hover effect to the box */
.leaflet-routing-container:hover {
    box-shadow: 0px 6px 10px rgba(0, 0, 0, 0.2); /* Slightly raise the shadow */
    transition: box-shadow 0.3s ease; /* Smooth transition for shadow */
}

    </style>
</head>

    <main>
        <div class="intro">
            <h1>Discover your next destination</h1>

        <div id="chat-container">
            <h2>How can I help you today?</h2>
            <div id="chat-messages"></div>


            <div id="input-container">
                <input type="text" id="user-input" placeholder="Enter a keyword (e.g., coffee, restaurant)">
                <button id="send-button">Send</button>
            </div>
            
        </div>
    </div>
    <footer>
        <div class="Socials">
            <h3>Socials</h3>
            <a href="">
                <img src="https://w7.pngwing.com/pngs/877/705/png-transparent-instagram-photo-picture-social-brands-and-logos-icon.png" alt="Instagram" class="social-icon" width="15"> <!-- Instagram Icon -->
            </a>
            <a href="">
                <img src="https://img.freepik.com/premium-vector/new-twitter-logo-x-2023-twitter-x-logo-official-vector-download_691560-10797.jpg" alt="Twitter" class="social-icon" width="15" > <!-- Twitter Icon -->
            </a>
            <a href="">
                <img src="https://www.citypng.com/public/uploads/preview/hd-linkedin-square-black-icon-transparent-background-7017516949739946gsykkwdmd.png" alt="LinkedIn" class="social-icon" width="15"> <!-- LinkedIn Icon -->
            </a>
            <a href="">
                <img src="https://www.citypng.com/public/uploads/preview/round-black-facebook-fb-logo-icon-sign-701751695134781upkxjlqwck.png" alt="Facebook" class="social-icon" width="15"> <!-- Facebook Icon -->
            </a>

    <div id="map"></div>

    </main>


    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.4.2/src/fuse.min.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.2/dist/leaflet-routing-machine.js"></script>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_API_KEY&libraries=places,directions" async defer></script>
    <script>
// Your Foursquare API key
const FOURSQUARE_API_KEY = 'YOUR_FOURSQUARE_API_KEY';

const chatMessages = document.getElementById('chat-messages');
const userInput = document.getElementById('user-input');
const sendButton = document.getElementById('send-button');

let map;
let markers = [];
let userLocation;
let userMarker;

function getDirectionsTo(lat, lng, placeName) {
    if (!userLocation) {
        addMessage("⚠️ Your location is not available. Cannot get directions.");
        return;
    }

    const userLat = userLocation.lat;
    const userLng = userLocation.lng;

    // Create a route using Leaflet Routing Machine
    const routeControl = L.Routing.control({
        waypoints: [
            L.latLng(userLat, userLng),
            L.latLng(lat, lng)
        ],
        createMarker: function() { return null; }, // Optional: Don't display markers for waypoints
        routeWhileDragging: true
    }).addTo(map);

    routeControl.on('routesfound', function(event) {
        const routes = event.routes;
        const distance = routes[0].summary.totalDistance / 1000; // Convert to kilometers
        const time = routes[0].summary.totalTime / 60; // Convert to minutes

        addMessage(`🚗 Directions to ${placeName}: ${distance.toFixed(1)} km, about ${Math.round(time)} minutes.`);
    });
}


// Get user's current location and initialize map

// Google API Key
const GOOGLE_API_KEY = 'YOUR_GOOGLE_API_KEY';

// Function to get the current location using Google Geolocation API
async function getCurrentLocation() {
    try {
        // Make a request to the Google Geolocation API to get the current location
        const response = await fetch(`https://www.googleapis.com/geolocation/v1/geolocate?key=${GOOGLE_API_KEY}`, { method: 'POST' });
        
        if (!response.ok) {
            throw new Error(`API request failed with status ${response.status}`);
        }

        const data = await response.json();
        const { lat, lng } = data.location;

        // Set the user's location
        userLocation = { lat, lng };
        initMap(lat, lng);
        addMessage("📍Found your location! What kind of place are you looking for?");
        
        return `${lat},${lng}`; // Return location for use in the search
    } catch (error) {
        console.error('Geolocation API error:', error);
        
        // Fallback to a default location if Google API fails
        userLocation = { lat: 40.7128, lng: -74.0060 }; // New York City as default
        initMap(40.7128, -74.0060);
        addMessage("⚠️ Couldn't get your location using Google Geolocation. Using default location.");
        
        return '40.7128,-74.0060'; // Return default location for use in the search
    }
}

// Function to initialize map at the given location
function initMap(lat, lng) {
    if (map) {
        map.remove();
    }
    
    map = L.map('map').setView([lat, lng], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Add user location marker with custom icon
    if (userMarker) {
        map.removeLayer(userMarker);
    }
    
    userMarker = L.marker([lat, lng], {
        icon: L.divIcon({
            className: 'user-marker',
            html: '📍',
            iconSize: [25, 25]
        })
    }).addTo(map);
    userMarker.bindPopup('Your Location').openPopup();
}

function addMessage(message, isUser = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
    messageDiv.textContent = message;
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearMarkers() {
    markers.forEach(marker => map.removeLayer(marker));
    markers = [];
}



async function findPOIs(poiQueries, ll) {
    const results = [];
    let currentLocation = ll;

    // Start with the first POI query as the primary search
    const primaryPoi = poiQueries[0];
    const primaryResults = await searchPlaces(primaryPoi, currentLocation);

    if (primaryResults.length > 0) {
        // Add the found primary POIs to results
        results.push(...primaryResults);

        // Loop through the remaining POI queries for secondary searches
        for (let i = 1; i < poiQueries.length; i++) {
            const secondaryPoi = poiQueries[i];

            // For each primary result, find the secondary POIs
            for (const place of primaryResults) {
                // Create a variable for the coordinates of the current primary place
                const nextCoordinates = `${place.geocodes.main.latitude},${place.geocodes.main.longitude}`;

                // Search for the secondary POI using the coordinates of the current primary place
                const secondaryPoiResults = await searchPlaces(secondaryPoi, nextCoordinates);
                
                // Store the secondary results in the current primary place object
                place[secondaryPoi] = secondaryPoiResults.slice(0, 5); // Store up to 5 secondary POIs found near this place
            }
        }
    } else {
        addMessage(`No results found for ${primaryPoi}.`);
    }

    // Log the places array to the console for debugging
    console.log("Places found:", results);

    return results; // Return all found primary places with their secondary POIs
}



function displayPlaces(places) {
    if (!places || places.length === 0) {
        addMessage("Sorry, I couldn't find any places matching your search.");
        return;
    }

    addMessage("Here are some places I found:");
    clearMarkers();

    places.forEach((place) => {
        // Create a parent div for the first POI
        const primaryPlaceDiv = document.createElement('div');
        primaryPlaceDiv.className = 'place-card';
        primaryPlaceDiv.innerHTML = `
            <strong>${place.name}</strong><br>
            ${place.location.formatted_address || 'Address not available'}<br>
            ${place.categories[0]?.name || 'Category not available'}<br>
        `;

        // Check for next POIs found for this place
        let hasNextPOIs = false; // Flag to check if there are any next POIs
        for (const [poi, poiResults] of Object.entries(place)) {
            // Skip non-POI properties and only process valid POIs
            if (poi !== 'name' && poi !== 'location' && poi !== 'categories') {
                // Ensure poiResults is an array before mapping
                const validPoiResults = Array.isArray(poiResults) ? poiResults : [];
                
                // Only display second POIs if they exist
                if (validPoiResults.length > 0) {
                    hasNextPOIs = true; // Set flag to true if there are next POIs
                    const nextPoiDiv = document.createElement('div');
                    nextPoiDiv.className = 'next-poi-list';
                    nextPoiDiv.innerHTML = `<strong>${poi.charAt(0).toUpperCase() + poi.slice(1)} near ${place.name}:</strong><br>`;
                    
                    validPoiResults.forEach((nextPlace) => {
                        // Create a new div for each secondary POI
                        const secondaryPlaceDiv = document.createElement('div');
                        secondaryPlaceDiv.className = 'place-card';
                        secondaryPlaceDiv.innerHTML = `
                            <strong>${nextPlace.name}</strong><br>
                            ${nextPlace.location.formatted_address || 'Address not available'}<br>
                            ${nextPlace.categories[0]?.name || 'Category not available'}<br>
                            `;
                        
                        // Add a marker for the secondary POI
                        const marker = L.marker([nextPlace.geocodes.main.latitude, nextPlace.geocodes.main.longitude])
                            .addTo(map)
                            .bindPopup(`
                                <strong>${nextPlace.name}</strong><br>
                                ${nextPlace.location.formatted_address || 'Address not available'}<br>
                                ${nextPlace.categories[0]?.name || 'Category not available'}<br>
                                <button onclick="getDirectionsTo(${nextPlace.geocodes.main.latitude}, ${nextPlace.geocodes.main.longitude}, '${nextPlace.name}')">
                                    Get Directions
                                </button>
                            `);
                        
                        markers.push(marker);

                        // Append the secondary POI div to the next POI div
                        nextPoiDiv.appendChild(secondaryPlaceDiv);
                    });

                    // Append the next POI div to the parent primary place div
                    primaryPlaceDiv.appendChild(nextPoiDiv);
                }
            }
        }

        // Only append the primary place div if it has relevant information
        if (hasNextPOIs || (primaryPlaceDiv.innerHTML.trim() !== "")) {
            // Add marker to map for the primary POI
            const marker = L.marker([place.geocodes.main.latitude, place.geocodes.main.longitude])
                .addTo(map)
                .bindPopup(`
                    <strong>${place.name}</strong><br>
                    ${place.location.formatted_address || 'Address not available'}<br>
                    ${place.categories[0]?.name || 'Category not available'}<br>
                    <button onclick="getDirectionsTo(${place.geocodes.main.latitude}, ${place.geocodes.main.longitude}, '${place.name}')">
                        Get Directions
                    </button>
                `);
            
            markers.push(marker);

            primaryPlaceDiv.addEventListener('click', () => {
                map.setView([place.geocodes.main.latitude, place.geocodes.main.longitude], 15);
                marker.openPopup();
            });

            chatMessages.appendChild(primaryPlaceDiv);
        }
    });

    // Fit map bounds to show all markers and user location
    const bounds = L.latLngBounds([
        [userLocation.lat, userLocation.lng],
        ...markers.map(marker => marker.getLatLng())
    ]);
    map.fitBounds(bounds, { padding: [50, 50] });

    chatMessages.scrollTop = chatMessages.scrollHeight;
}

sendButton.addEventListener('click', handleUserInput);
userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        handleUserInput();
    }
});

// Start the app by getting user's location
document.addEventListener('DOMContentLoaded', () => {
    addMessage("Getting your location...");
    getCurrentLocation();
});




// Function to calculate the distance between two coordinates using Haversine formula
function haversineDistance(coord1, coord2) {
    const R = 6371; // Radius of the Earth in km
    const dLat = (coord2.lat - coord1.lat) * (Math.PI / 180);
    const dLon = (coord2.lng - coord1.lng) * (Math.PI / 180);
    const a = 
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(coord1.lat * (Math.PI / 180)) * Math.cos(coord2.lat * (Math.PI / 180)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; // Distance in km
}

// Function to find the nearest place
async function findNearestPlace(places) {
    if (!userLocation) {
        console.error("User  location not available.");
        return;
    }
    
    let nearestPlace = null;
    let shortestDistance = Infinity;

    places.forEach(place => {
        // Ensure that the place has the required geocode properties
        const placeCoords = place.geocodes?.main; // Use optional chaining to avoid errors
        if (placeCoords) {
            const distance = haversineDistance(userLocation, {
                lat: placeCoords.latitude,
                lng: placeCoords.longitude
            });
            if (distance < shortestDistance) {
                shortestDistance = distance;
                nearestPlace = place;
            }
        } else {
            console.warn(`Place ${place.name} does not have valid coordinates.`);
        }
    });

    if (nearestPlace) {
        displayPlaces(places, nearestPlace);
        console.log(`The nearest place is ${nearestPlace.name}, which is ${shortestDistance.toFixed(2)} km away.`);
    } else {
        console.log("No places found.");
        displayPlaces(places); // Display places without highlighting
    }
}

// Call the function to find the nearest place
findNearestPlace(places);



async function searchPlaces(query, location) {
    try {
        // Log query and location before making the request
        console.log("Query being sent to Foursquare API:", query);
        console.log("Location being sent to Foursquare API:", location);

        // Construct the Foursquare API URL with the location and query
        const url = `https://api.foursquare.com/v3/places/search?query=${encodeURIComponent(query)}&ll=${location}&radius=1000&limit=10`;

        // Log the full URL to see what is being requested
        console.log("Full Foursquare API URL:", url);

        // Make the API call
        const response = await fetch(url, {
            headers: {
                'Authorization': FOURSQUARE_API_KEY
            }
        });

        // Log the response status to ensure it's successful
        console.log("Foursquare API response status:", response.status);

        // Parse and log the response JSON
        const data = await response.json();
        console.log("Foursquare API response data:", data);

        return data.results || [];
    } catch (error) {
        console.error('Error in Foursquare API request:', error);
        return [];
    }
}


async function sendToLLM(input) {
    try {
        // Construct the prompt with user input embedded within it
        const prompt = `
        You are an intelligent assistant that extracts structured information for the Foursquare API. 

        (1) Users may request multiple types of places (POIs) in a single query. For example:
            - "cafes near libraries near gyms" means find gyms first, then libraries near those gyms, and finally cafes near those libraries.
        (2) If the user doesn't provide a location, return "ll": null. If they specify a location, extract it and return it as "latitude,longitude".

        Respond ONLY with a JSON object in the following format:
        {
          "poi_queries": ["first type of place (e.g., 'gyms')", "second type (e.g., 'libraries')", "third type (e.g., 'cafes')"],
          "ll": "latitude,longitude"
        }

        User Query: "${input}"
        `;

        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer YOUR_GROQ_API_KEY' // API Key
            },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [{ role: "user", content: prompt }]
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            console.error(`API request failed with status: ${response.status}, Error: ${errorText}`);
            return 'Failed to process your request. Please try again.';
        }

        const data = await response.json();

        // Extract JSON object if there's additional text
        const llmResponse = data.choices[0].message.content.trim();
        console.log('Raw LLM Response:', llmResponse);

        // Use regular expression to match JSON object in response
        const jsonMatch = llmResponse.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
            const jsonResponse = jsonMatch[0];
            console.log('Extracted JSON:', jsonResponse);
            return JSON.parse(jsonResponse); // Parse and return the JSON object
        } else {
            console.error('No JSON found in LLM response:', llmResponse);
            return {
                error: "Could not extract a valid JSON object from the LLM response.",
            };
        }

    } catch (error) {
        console.error('Error communicating with Groq API:', error);
        return {
            error: error.message,
        };
    }
}

async function handleUserInput() {
    const input = userInput.value.trim();
    if (input) {
        addMessage(input, true); // Display the user's message
        userInput.value = ''; // Clear the input field

        try {
            const llmResponse = await sendToLLM(input); // Get response from LLM
            console.log('Raw response from LLM:', llmResponse); // Log raw response for debugging

            if (llmResponse.poi_queries && Array.isArray(llmResponse.poi_queries)) {
                const { poi_queries, ll } = llmResponse;
                console.log('Parsed POI Queries:', poi_queries);
                addMessage(`Searching for: ${poi_queries.join(', ')}`);

                // If 'll' is null, none, or invalid, use the current location
                let locationToUse = ll;
                if (!locationToUse || locationToUse === 'null' || locationToUse === 'none') {
                    locationToUse = await getCurrentLocation();  // Get current location using Google Geolocation API
                }

                // Find POIs based on the queries
                const results = await findPOIs(poi_queries, locationToUse);
                displayPlaces(results);
            } else {
                addMessage("Sorry, I couldn't extract the expected data. Please try again.");
            }
        } catch (error) {
            console.error('Error parsing LLM response:', error);
            addMessage("Sorry, there was an error understanding the response. Please try rephrasing your request.");
        }
    }
}

sendButton.addEventListener('click', handleUserInput);
userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        handleUserInput();
    }
});

// Start the app by getting the user's location
document.addEventListener('DOMContentLoaded', () => {
    addMessage("Getting your location...");
    getCurrentLocation();
});


    </script>
