<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
	
        /* Header styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* Align items to the top */
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: sticky; /* Keeps the header fixed at the top */
            top: 0;
            z-index: 1000;
        }

        header img {
            height: 100px; /* Adjust the height as needed */
			Width: 190px;
            margin: 0; /* Remove any extra margins */
        }
	

        /* General body styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #FFFF99, #FFB6C1);
            margin: 0;
            color: #333;
        }

        /* Container styling */
        .container {
            background-color: #ffffff;
            padding: 40px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
			            margin: 130px auto;
            text-align: center;
        }

        /* Heading styling */
        h2 {
            color: #FF9AAE;
            margin-bottom: 20px;
        }

        /* Input styling */
        .input-field {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Button styling */
        .btn {
            width: 100%;
            padding: 10px;
            background-color: #FFB6C1;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #ea3baa;
        }

        /* Link styling */
        .link {
            display: block;
            margin-top: 15px;
            color: #1f0de6;
            text-decoration: none;
        }

        .link:hover {
            color: #ea3baa;
        }

        /* Footer headings */
footer h3 {
    margin: 0;
    padding-bottom: 5px;
}

/* Styling for the social icons */
.social-icon {
    width: 15px; /* Width of the icon */
    height: auto; /* Maintain aspect ratio */
    margin-left: 5px; /* Space between the text and the icon */
    vertical-align: middle; /* Align the icon vertically with the text */
    border-radius: 5px;
}

        /* Footer styling */
        footer {
            position: fixed; /* Keep the footer at the bottom */
            bottom: 0;
            width: 100%; /* Stretch across the full width */
            color: white; /* White text color */
            padding: 20px 0; /* Spacing above and below the footer content */
            text-align: center; /* Center the text */
            display: flex; /* Flexbox to align sections horizontally */
            justify-content: space-around; /* Space the sections evenly */
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Example Image">
        <a href="signin.html">
            <div class="profile-icon"></div>
        </a>
    </header>
    <div class="container">
        <h2>Log In</h2>
        <form>
            <input type="email" class="input-field" placeholder="Email" required>
            <input type="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="btn">Sign In</button>
            <a href="#" class="link">Forgot Password?</a>
        </form>
        <hr>
        <p>Don't have an account? <a href="signin.html" class="link">Sign Up</a></p>
    </div>

    <footer>
        <div class="Socials">
            <h3>Socials</h3>
            <a href="">
                <img src="https://w7.pngwing.com/pngs/877/705/png-transparent-instagram-photo-picture-social-brands-and-logos-icon.png" alt="Instagram" class="social-icon" width="15"> <!-- Instagram Icon -->
            </a>
            <a href="">
                <img src="https://img.freepik.com/premium-vector/new-twitter-logo-x-2023-twitter-x-logo-official-vector-download_691560-10797.jpg" alt="Twitter" class="social-icon" width="15" > <!-- Twitter Icon -->
            </a>
            <a href="">
                <img src="https://www.citypng.com/public/uploads/preview/hd-linkedin-square-black-icon-transparent-background-7017516949739946gsykkwdmd.png" alt="LinkedIn" class="social-icon" width="15"> <!-- LinkedIn Icon -->
            </a>
            <a href="">
                <img src="https://www.citypng.com/public/uploads/preview/round-black-facebook-fb-logo-icon-sign-701751695134781upkxjlqwck.png" alt="Facebook" class="social-icon" width="15"> <!-- Facebook Icon -->
            </a>
        </div>
    </footer>



</body>
</html>
